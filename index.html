<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>SVVR 三層架構（分散 Hotspot + 大型閱讀面板）</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

  <style>
    #nameGate{
      position:fixed; inset:0;
      background:rgba(0,0,0,0.85);
      display:flex; align-items:center; justify-content:center;
      z-index:9999; padding:24px;
      font-family:'Noto Sans TC',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:#fff;
    }
    #nameCard{
      width:min(460px,100%);
      background:rgba(20,20,20,0.92);
      border-radius:14px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,0.35);
    }
    #nameCard h2{ margin:0 0 10px; font-size:18px; }
    #nameCard p{ margin:0 0 12px; font-size:13px; opacity:.9; line-height:1.5; }
    #nameRow{ display:flex; gap:10px; }
    #studentNameInput{
      flex:1; font-size:16px; padding:10px 12px; border-radius:10px;
      border:1px solid rgba(255,255,255,0.22); background:rgba(255,255,255,0.08);
      color:#fff; outline:none;
    }
    #startBtn{
      font-size:16px; padding:10px 14px; border-radius:10px; border:0;
      background:#2f7cff; color:#fff; cursor:pointer; white-space:nowrap;
    }
    #hint{ margin-top:10px; font-size:12px; opacity:.75; }
  </style>

  <script>
    const STORAGE_KEY_NAME  = 'svvr_student_name_v1';
    const STORAGE_KEY_STATE = 'svvr_state_v1';

    const TOPICS = {
      t1: {
        name: "Topic 1",
        hubPano: "#pano_t1_hub",
        objectives: [
          "了解 Topic 1 的學習目標（示範）",
          "能辨識 3 種代表性特徵（示範）"
        ],
        lessons: [
          { id: "t1_l1", name: "A", pano: "#pano_t1_l1", hotspotsGroup: "#hotspots-t1_l1", totalHotspots: 5 },
          { id: "t1_l2", name: "B", pano: "#pano_t1_l2", hotspotsGroup: "#hotspots-t1_l2", totalHotspots: 2 },
          { id: "t1_l3", name: "C", pano: "#pano_t1_l3", hotspotsGroup: "#hotspots-t1_l3", totalHotspots: 2 },
        ],
        quiz: {
          questions: [
            { q: "非洲菫、黃金葛分別屬於哪一科？", options: ["苦苣苔科、天南星科", "莧科、蘭雪花科", "堇菜科、茜草科"], answer: 0, explain: "正確答案：苦苣苔科、天南星科" },
            { q: "蘭科植物的主要特徵為何？", options: ["具雄、雌蕊合生而成的蕊柱", "花為肉穗花序", "花瓣為 4 的倍數"], answer: 0, explain: "正確答案：具雄、雌蕊合生而成的蕊柱" },
          ]
        }
      },
      t2: {
        name: "Topic 2",
        hubPano: "#pano_t2_hub",
        objectives: ["（示範）目標 1", "（示範）目標 2"],
        lessons: [
          { id: "t2_l1", name: "D", pano: "#pano_t2_l1", hotspotsGroup: "#hotspots-t2_l1", totalHotspots: 2 },
          { id: "t2_l2", name: "E", pano: "#pano_t2_l2", hotspotsGroup: "#hotspots-t2_l2", totalHotspots: 2 },
          { id: "t2_l3", name: "F", pano: "#pano_t2_l3", hotspotsGroup: "#hotspots-t2_l3", totalHotspots: 4 },
        ],
        quiz: {
          questions: [
            { q: "何種植物又稱重陽木？", options: ["相思樹", "茄苳", "苦楝"], answer: 1, explain: "第 1 題正確答案：茄苳" },
            { q: "下列何種植物屬於大喬木，不適合種植於混擬土花台中？", options: ["黃椰子", "緬梔", "榕樹"], answer: 2, explain: "第 2 題正確答案：榕樹" },
          ]
        }
      },
      t3: {
        name: "Topic 3",
        hubPano: "#pano_t3_hub",
        objectives: ["（示範）目標 1", "（示範）目標 2"],
        lessons: [
          { id: "t3_l1", name: "G", pano: "#pano_t3_l1", hotspotsGroup: "#hotspots-t3_l1", totalHotspots: 2 },
          { id: "t3_l2", name: "H", pano: "#pano_t3_l2", hotspotsGroup: "#hotspots-t3_l2", totalHotspots: 2 },
          { id: "t3_l3", name: "I", pano: "#pano_t3_l3", hotspotsGroup: "#hotspots-t3_l3", totalHotspots: 2 },
        ],
        quiz: {
          questions: [
            { q: "何種植物又稱七里香？", options: ["月橘", "洋繡球", "朱槿"], answer: 0, explain: "第 1 題正確答案：月橘" },
            { q: "何種植物又稱扶桑？", options: ["月橘", "洋繡球", "朱槿"], answer: 2, explain: "第 2 題正確答案：朱槿" },
          ]
        }
      }
    };

    let state = {
      version: 1,
      current: { level: "topicMenu", topicId: null, lessonId: null, enteredAt: null },
      progress: {},
      progressSeen: {},
      quiz: {},
      quizRuntime: null,
      logs: []
    };

    let hubProgressOpen = false;

    function saveState(){
      try { localStorage.setItem(STORAGE_KEY_STATE, JSON.stringify(state)); } catch(e){}
    }
    function loadState(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY_STATE);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object') state = parsed;
      } catch(e){}
    }

    function nowTs(){ return Date.now(); }
    function formatLocalTime(ts){
      const d = new Date(ts);
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      const h = String(d.getHours()).padStart(2,'0');
      const min = String(d.getMinutes()).padStart(2,'0');
      const s = String(d.getSeconds()).padStart(2,'0');
      return `${y}-${m}-${day} ${h}:${min}:${s}`;
    }
    function currentSceneDuration(){
      const enteredAt = state?.current?.enteredAt;
      if (!enteredAt) return 0;
      return Math.max(0, Number(((Date.now() - enteredAt) / 1000).toFixed(1)));
    }
    function setCurrentScene(level, topicId=null, lessonId=null){
      state.current = { level, topicId, lessonId, enteredAt: nowTs() };
    }
    function buildLogEntry(type, extra={}){
      const topicId = extra.topic_id ?? extra.topicId ?? state?.current?.topicId ?? '';
      const sceneId = extra.scene_id ?? extra.sceneId ?? state?.current?.lessonId ?? (topicId ? `${topicId}_hub` : state?.current?.level || 'topic_menu');
      const entry = {
        time: formatLocalTime(nowTs()),
        topic_id: topicId || '',
        scene_id: sceneId || '',
        event_type: type || '',
        hotspot_id: extra.hotspot_id ?? extra.hotspotId ?? '',
        question_id: extra.question_id ?? '',
        selected_option: extra.selected_option ?? '',
        correct_answer: extra.correct_answer ?? '',
        is_correct: extra.is_correct ?? '',
        duration_in_scene: extra.duration_in_scene ?? currentSceneDuration()
      };
      return entry;
    }
    function logEvent(type, extra={}){
      state.logs.push(buildLogEntry(type, extra));
      saveState();
    }

    function qs(sel){ return document.querySelector(sel); }
    const RAYCAST_PARK_POS = '0 -999 5';
    function parkForRaycast(sel, park){
      const el = typeof sel === 'string' ? qs(sel) : sel;
      if (!el) return;
      if (!el.dataset.homePosition) {
        const p = el.getAttribute('position');
        if (p && typeof p === 'object') el.dataset.homePosition = `${p.x} ${p.y} ${p.z}`;
        else el.dataset.homePosition = (p || '0 0 0');
      }
      el.setAttribute('position', park ? RAYCAST_PARK_POS : el.dataset.homePosition);
    }
    function setVisible(sel, visible){
      const el = qs(sel);
      if (!el) return;
      el.setAttribute('visible', !!visible);
    }
    function setText(sel, value){
      const el = qs(sel);
      if (!el) return;
      if (el.hasAttribute('troika-text')) {
        el.setAttribute('troika-text', 'value', value);
      } else {
        el.setAttribute('text', 'value', value);
      }
    }
    function isEntityVisible(sel){
      const el = qs(sel);
      return !!(el && el.getAttribute('visible'));
    }
    function isAnyOverlayOpen(){
      return isEntityVisible('#infoPanel') || isEntityVisible('#hubProgressPanel');
    }
    function activeOverlayType(){
      if (isEntityVisible('#infoPanel')) return 'info';
      if (isEntityVisible('#hubProgressPanel')) return 'progress';
      return '';
    }

    function hideAllPages(){
      ['#pageTopicMenu', '#pageHub', '#pageQuiz', '#pageLesson'].forEach(sel => {
        setVisible(sel, false);
        parkForRaycast(sel, true);
      });
      document.querySelectorAll('[id^="pageLesson-"]').forEach(el => {
        el.setAttribute('visible', false);
        parkForRaycast(el, true);
      });
    }

    function hideAllHotspotGroups(){
      for (const t of Object.values(TOPICS)) {
        for (const lesson of t.lessons) {
          setVisible(lesson.hotspotsGroup, false);
          parkForRaycast(lesson.hotspotsGroup, true);
        }
      }
    }

    function setSky(srcSelector){
      const sky = qs('#sky');
      if (!sky) return;
      sky.setAttribute('src', srcSelector);
      sky.setAttribute('material', 'src', srcSelector);
    }

    function setHud(title){
      const name = localStorage.getItem(STORAGE_KEY_NAME) || '未命名';
      setText('#hudText', `${name}｜${title}`);
    }

    function setHudVisible(show){
      const hud = qs('#hud');
      if (!hud) return;
      hud.setAttribute('visible', !!show);
    }

    function toggleHubProgress(force){
      const panel = qs('#hubProgressPanel');
      const backdrop = qs('#hubProgressBackdrop');
      if (!panel) return;
      const wasOpen = hubProgressOpen;
      hubProgressOpen = (force !== undefined) ? !!force : !hubProgressOpen;
      panel.setAttribute('visible', hubProgressOpen);
      if (backdrop) backdrop.setAttribute('visible', hubProgressOpen);
      setText('#hubQuizStatus', hubProgressOpen ? '選擇題：先關閉進度面板再開始' : (isTopicComplete(state.current.topicId) ? '選擇題：已解鎖' : '選擇題：完成所有單元後解鎖'));
      if (hubProgressOpen !== wasOpen) {
        logEvent(hubProgressOpen ? 'progress_open' : 'progress_close', {
          topic_id: state?.current?.topicId || '',
          scene_id: state?.current?.lessonId || (state?.current?.topicId ? `${state.current.topicId}_hub` : 'topic_menu')
        });
      }
      updateUiLock();
    }

    function setClickableLock(locked){
      document.querySelectorAll('[data-hotspot="true"]').forEach(el => {
        if (locked) el.classList.remove('clickable');
        else el.classList.add('clickable');
      });
      document.querySelectorAll('[data-ui="true"]').forEach(el => {
        if (locked) el.classList.remove('clickable');
        else el.classList.add('clickable');
      });
      qs('#infoCloseBtn')?.classList.add('clickable');
    }

    function updateUiLock(){
      const locked = isAnyOverlayOpen();
      setClickableLock(locked);
      if (!locked) return;
      const t = activeOverlayType();
      if (t === 'info') qs('#infoCloseBtn')?.classList.add('clickable');
      if (t === 'progress') {
        qs('#btnCloseProgress')?.classList.add('clickable');
        qs('#btnOpenProgress')?.classList.add('clickable');
      }
    }
    function setLessonFocusMode(enabled){
      const { lessonId } = state.current || {};
      if (!lessonId) return;
      const lessonPageSel = `#pageLesson-${lessonId}`;
      const lessonPage = qs(lessonPageSel);
      if (lessonPage) {
        lessonPage.setAttribute('visible', !enabled);
      }

      let hotspotGroupSel = null;
      for (const topic of Object.values(TOPICS)) {
        const lesson = topic.lessons.find(x => x.id === lessonId);
        if (lesson) {
          hotspotGroupSel = lesson.hotspotsGroup;
          break;
        }
      }
      if (hotspotGroupSel) {
        const hotspotGroup = qs(hotspotGroupSel);
        if (hotspotGroup) hotspotGroup.setAttribute('visible', !enabled);
      }
    }

    function closeInfoPanel(){
      setVisible('#infoPanel', false);
      setLessonFocusMode(false);
      updateUiLock();
    }
    function closeProgressPanel(){
      if (!hubProgressOpen) return;
      toggleHubProgress(false);
    }

    function goTopicMenu(){
      toggleHubProgress(false);
      hideAllHotspotGroups();
      setCurrentScene('topicMenu', null, null);
      saveState();
      closeInfoPanel();

      hideAllPages();
      setSky('#pano_topic_menu');
      setHudVisible(false);
      const studentName = localStorage.getItem(STORAGE_KEY_NAME) || 'Student';
      setText('#topicMenuTitle', `${studentName}`);
      parkForRaycast('#pageTopicMenu', false);
      setVisible('#pageTopicMenu', true);

      logEvent('nav_topic_menu', { scene_id: 'topic_menu' });
    }

    function initLessonProgress(lesson){
      if (!state.progress[lesson.id]) {
        state.progress[lesson.id] = {
          doneHotspots: 0,
          totalHotspots: lesson.totalHotspots || 5,
          completed: false
        };
      } else {
        state.progress[lesson.id].totalHotspots = lesson.totalHotspots || state.progress[lesson.id].totalHotspots || 5;
      }
      state.progressSeen ||= {};
      state.progressSeen[lesson.id] ||= {};
      saveState();
    }

    function isTopicComplete(topicId){
      const topic = TOPICS[topicId];
      if (!topic) return false;
      for (const lesson of topic.lessons) {
        initLessonProgress(lesson);
        if (!state.progress[lesson.id]?.completed) return false;
      }
      return true;
    }

    function refreshHubUI(topicId){
      const topic = TOPICS[topicId];
      if (!topic) return;

      setText('#hubTitle', `${topic.name}`);
      const lessonTitleMap = { t1: '#btnimg-topic1', t2: '#btnimg-topic2', t3: '#btnimg-topic3' };
      const menuTitleImg = qs('#hubTitleImage');
      if (menuTitleImg) menuTitleImg.setAttribute('src', lessonTitleMap[topicId] || '#btnimg-topic1');
      setText('#hubObjectives', topic.objectives.map((o,i)=>`${i+1}. ${o}`).join('\n'));

      setText('#hubProgressTopicTitle', '學習進度');
      setText('#hubProgressTopicSub', '');

      let completedCount = 0;
      topic.lessons.forEach((lesson, idx) => {
        initLessonProgress(lesson);
        const p = state.progress[lesson.id];
        const ratio = Math.max(0, Math.min(1, p.doneHotspots / p.totalHotspots));
        const percent = Math.round(ratio * 100);
        if (p.completed) completedCount += 1;

        const lessonLabelMap = ['第一單元','第二單元','第三單元'];
        setText(`#hubProgressRowLabel${idx+1}`, lessonLabelMap[idx] || `第${idx+1}單元`);
        setText(`#hubProgressText${idx+1}`, `${percent}%`);
        setText(`#hubProgressStatus${idx+1}`, p.completed ? '已完成' : `已完成 ${p.doneHotspots}/${p.totalHotspots}`);

        updateProgressBar(`#hubBarFill${idx+1}`, ratio);
      });

      setText('#hubProgressSummary', '');

      const unlocked = isTopicComplete(topicId);
      setText('#hubQuizStatus', unlocked ? '選擇題：已解鎖' : '選擇題：完成所有單元後解鎖');

      const quizState = state.quiz[topicId];
      const quizBtn = qs('#btnStartQuiz');
      if (quizBtn) {
        const canOpen = unlocked;
        quizBtn.setAttribute('opacity', canOpen ? '1' : '0.45');
        quizBtn.setAttribute('data-enabled', canOpen ? 'true' : 'false');
        quizBtn.setAttribute('src', (quizState && quizState.done) ? '#btnimg-ans' : '#btnimg-text');
      }

      setVisible('#hubQuizResultPanel', false);
      setText('#hubQuizResultText', '');
    }

    function patchHubLessonButtons(topicId){
      ['t1','t2','t3'].forEach(id => {
        const active = id === topicId;
        setVisible(`#hubLessonGroup-${id}`, active);
        parkForRaycast(`#hubLessonGroup-${id}`, !active);
      });
      const quizBtn = qs('#btnStartQuiz');
      if (quizBtn) quizBtn.setAttribute('ui-action', `action: startQuiz; a: ${topicId}`);
    }

    function goHub(topicId){
      toggleHubProgress(false);
      hideAllHotspotGroups();
      const topic = TOPICS[topicId];
      if (!topic) return;

      patchHubLessonButtons(topicId);

      setCurrentScene('hub', topicId, null);
      saveState();
      closeInfoPanel();

      hideAllPages();
      setSky(topic.hubPano);
      setHudVisible(false);

      parkForRaycast('#pageHub', false);
      setVisible('#pageHub', true);
      refreshHubUI(topicId);

      logEvent('nav_hub', { topic_id: topicId, scene_id: `${topicId}_hub` });
    }

    function goLesson(topicId, lessonId){
      toggleHubProgress(false);
      const topic = TOPICS[topicId];
      if (!topic) return;
      const lesson = topic.lessons.find(x => x.id === lessonId);
      if (!lesson) return;

      setCurrentScene('lesson', topicId, lessonId);
      saveState();
      closeInfoPanel();

      hideAllPages();
      setSky(lesson.pano);
      setHudVisible(false);

      parkForRaycast(`#pageLesson-${lesson.id}`, false);
      setVisible(`#pageLesson-${lesson.id}`, true);
      hideAllHotspotGroups();
      parkForRaycast(lesson.hotspotsGroup, false);
      setVisible(lesson.hotspotsGroup, true);

      initLessonProgress(lesson);

      logEvent('nav_lesson', { topic_id: topicId, scene_id: lessonId });
    }

    function faceCameraYaw(panelEl){
      const cam = qs('[camera]');
      if (!panelEl || !cam || !window.THREE) return;
      const panelPos = new THREE.Vector3();
      const camPos = new THREE.Vector3();
      panelEl.object3D.getWorldPosition(panelPos);
      cam.object3D.getWorldPosition(camPos);
      const dx = camPos.x - panelPos.x;
      const dz = camPos.z - panelPos.z;
      const yaw = Math.atan2(dx, dz) * (180 / Math.PI);
      panelEl.setAttribute('rotation', `0 ${yaw} 0`);
    }

    function updateProgressBar(fillSel, ratio, baseWidth = 1.88){
      const fill = qs(fillSel);
      if (!fill) return;
      const safeRatio = Math.max(0, Math.min(1, ratio || 0));
      const width = Math.max(0.001, Number((baseWidth * safeRatio).toFixed(4)));
      const centerX = Number((-baseWidth / 2 + width / 2).toFixed(4));
      fill.setAttribute('width', width);
      fill.setAttribute('position', `${centerX} -0.02 0.01`);
      fill.setAttribute('visible', safeRatio > 0);
    }

    function markHotspotDone(topicId, lessonId, hotspotId){
      const topic = TOPICS[topicId];
      if (!topic) return;
      const lesson = topic.lessons.find(x => x.id === lessonId);
      if (!lesson) return;

      initLessonProgress(lesson);
      const p = state.progress[lesson.id];

      if (state.progressSeen?.[lesson.id]?.[hotspotId]) return;
      state.progressSeen[lesson.id][hotspotId] = true;

      p.doneHotspots = Math.min(p.totalHotspots, (p.doneHotspots || 0) + 1);
      p.completed = (p.doneHotspots >= p.totalHotspots);
      saveState();

      logEvent('hotspot_open', { topic_id: topicId, scene_id: lessonId, hotspot_id: hotspotId });
    }

    
    // 讓面板只做水平朝向鏡頭，避免整個 UI 傾斜變形
    AFRAME.registerComponent('face-center', {
      tick: function(){
        if (!this.el || !this.el.object3D || !window.THREE) return;
        const cam = document.querySelector('[camera]');
        if (!cam || !cam.object3D) return;

        const panelPos = new THREE.Vector3();
        const camPos = new THREE.Vector3();
        this.el.object3D.getWorldPosition(panelPos);
        cam.object3D.getWorldPosition(camPos);

        const dx = camPos.x - panelPos.x;
        const dz = camPos.z - panelPos.z;
        const yaw = Math.atan2(dx, dz) * (180 / Math.PI);
        this.el.setAttribute('rotation', `0 ${yaw} 0`);
      }
    });

AFRAME.registerComponent('hotspot-panel', {
      schema: {
        img: { type: 'selector' },
        side: { default: 'right' },
        distance: { default: 1.0 },
        hid: { default: '' }
      },
      init: function(){
        this.onClick = () => {
          if (isAnyOverlayOpen()) return;
          const panel = qs('#infoPanel');
          const imgPlane = qs('#infoImage');
          if (!panel || !imgPlane || !window.THREE) return;

          const { topicId, lessonId } = state.current || {};
          if (!topicId || !lessonId) return;

          const hotspotId = this.data.hid || this.el.getAttribute('id') || ('hs_' + Math.random());
          markHotspotDone(topicId, lessonId, hotspotId);

          const imgEl = this.data.img;
          if (imgEl) imgPlane.setAttribute('material', 'src', `#${imgEl.id}`);

          const hotspotPos = new THREE.Vector3();
          this.el.object3D.getWorldPosition(hotspotPos);
          const cam = qs('[camera]');
          const p = hotspotPos.clone();
          const d = this.data.distance || 1.0;
          let offset = new THREE.Vector3(d * 0.34, -0.04, 0.18);
          if (this.data.side === 'left') offset.set(-d * 0.34, -0.04, 0.18);
          if (this.data.side === 'up') offset.set(0, d * 0.18, 0.18);
          if (this.data.side === 'down') offset.set(0, -d * 0.20, 0.18);
          p.add(offset);

          if (cam && cam.object3D){
            const camPos = new THREE.Vector3();
            const panelDir = new THREE.Vector3().subVectors(p, cam.object3D.getWorldPosition(camPos)).normalize();
            p.add(panelDir.multiplyScalar(0.16));
          }

          panel.setAttribute('position', `${p.x} ${p.y} ${p.z}`);
          panel.setAttribute('visible', true);
          faceCameraYaw(panel);
          setLessonFocusMode(true);

          updateUiLock();
        };
        this.el.addEventListener('click', this.onClick);
      },
      remove: function(){
        this.el.removeEventListener('click', this.onClick);
      }
    });

    function showQuizAnswerImage(topicId){
      const answerImg = qs('#quizAnswerImage');
      if (!answerImg) return;
      const srcMap = { t1: "#btnimg-ans1", t2: "#btnimg-ans2", t3: "#btnimg-ans3" };
      answerImg.setAttribute('src', srcMap[topicId] || "#btnimg-ans");
      answerImg.setAttribute('visible', true);
    }

    function hideQuizAnswerImage(){
      const answerImg = qs('#quizAnswerImage');
      if (!answerImg) return;
      answerImg.setAttribute('visible', false);
      answerImg.setAttribute('src', "#btnimg-ans");
    }

    function startQuiz(topicId){
      toggleHubProgress(false);
      hideAllHotspotGroups();
      if (!isTopicComplete(topicId)) return;
      if (state.quiz[topicId]?.done) return openQuizAnswers(topicId);

      closeInfoPanel();
      hideAllPages();
      parkForRaycast('#pageQuiz', false);
      setVisible('#pageQuiz', true);
      setHudVisible(false);
      hideQuizAnswerImage();

      state.quizRuntime = { topicId, idx: 0, chosen: [], startedAt: nowTs(), submitted: false };
      saveState();

      renderQuizQuestion();
      logEvent('quiz_start', { topic_id: topicId, scene_id: `${topicId}_quiz` });
    }

    function openQuizAnswers(topicId){
      const saved = state.quiz[topicId];
      const topic = TOPICS[topicId];
      if (!saved || !topic) return;

      toggleHubProgress(false);
      hideAllHotspotGroups();
      closeInfoPanel();
      hideAllPages();
      parkForRaycast('#pageQuiz', false);
      setVisible('#pageQuiz', true);
      setHudVisible(false);
      setText('#quizQuestion', `作答完成\n共答對 ${saved.score}/${saved.total} 題`);
      setText('#quizResult', topic.quiz.questions.map((q, i) => `第 ${i+1} 題正確答案：${q.options[q.answer]}`).join('\n'));
      setVisible('#quizResult', true);
      for (let i=1;i<=3;i++){
        const btn = qs(`#quizOptBtn${i}`);
        const label = qs(`#quizOptText${i}`);
        if (btn) btn.setAttribute('visible', false);
        if (label) label.setAttribute('visible', false);
      }
      const nextBtn = qs('#quizNextBtn');
      if (nextBtn) nextBtn.setAttribute('src', '#btnimg-back');
      state.quizRuntime = { topicId, idx: 0, chosen: saved.answers ? saved.answers.slice() : [], startedAt: saved.ts || nowTs(), submitted: true };
      saveState();
    }

    function renderQuizQuestion(){
      const rt = state.quizRuntime;
      if (!rt) return;
      const topic = TOPICS[rt.topicId];
      const qObj = topic.quiz.questions[rt.idx];
      if (!qObj) return;

      setText('#quizQuestion', `第 ${rt.idx+1} 題／${topic.quiz.questions.length} 題
${qObj.q}`);
      setText('#quizResult', '');
      setVisible('#quizResult', false);

      qObj.options.forEach((opt, i) => {
        setText(`#quizOptText${i+1}`, opt);
        const btn = qs(`#quizOptBtn${i+1}`);
        if (btn) {
          btn.setAttribute('visible', true);
          btn.setAttribute('material', 'color', (rt.chosen[rt.idx] === i) ? '#2f7cff' : '#333');
        }
        const label = qs(`#quizOptText${i+1}`);
        if (label) label.setAttribute('visible', true);
      });

      hideQuizAnswerImage();
      const nextBtn = qs('#quizNextBtn');
      if (nextBtn) {
        nextBtn.setAttribute('visible', true);
        nextBtn.setAttribute('src', (rt.idx < topic.quiz.questions.length-1) ? '#btnimg-next' : '#btnimg-ok');
      }
    }

    function chooseOption(optIndex){
      const rt = state.quizRuntime;
      if (!rt || rt.submitted) return;
      const topic = TOPICS[rt.topicId];
      const qObj = topic.quiz.questions[rt.idx];
      if (!qObj) return;

      rt.chosen[rt.idx] = optIndex;
      saveState();

      for (let i=0;i<qObj.options.length;i++){
        const btn = qs(`#quizOptBtn${i+1}`);
        if (btn) btn.setAttribute('material', 'color', (i===optIndex) ? '#2f7cff' : '#333');
      }

      logEvent('quiz_choose', {
        topic_id: rt.topicId,
        scene_id: `${rt.topicId}_quiz`,
        question_id: `q${rt.idx+1}`,
        selected_option: qObj.options[optIndex] ?? optIndex
      });
    }

    function prevQuiz(){ return; }

    function nextOrSubmitQuiz(){
      const rt = state.quizRuntime;
      if (!rt) return;
      const topic = TOPICS[rt.topicId];
      const total = topic.quiz.questions.length;

      if (rt.submitted){
        setText('#quizQuestion', '');
        setText('#quizResult', '');
        setVisible('#quizResult', false);
        hideQuizAnswerImage();
        setVisible('#pageQuiz', false);
        goHub(rt.topicId);
        return;
      }

      if (rt.chosen[rt.idx] === undefined) return;

      if (rt.idx < total-1){
        rt.idx += 1;
        saveState();
        renderQuizQuestion();
        return;
      }

      let score = 0;
      const details = topic.quiz.questions.map((q, i) => {
        const chosen = rt.chosen[i];
        const correct = (chosen === q.answer);
        if (correct) score += 1;
        return { chosen, correct, explain: q.explain };
      });

      state.quiz[rt.topicId] = {
        done: true,
        score,
        total,
        answers: rt.chosen.slice(),
        details,
        ts: nowTs()
      };
      saveState();

      topic.quiz.questions.forEach((q, i) => {
        const chosenIndex = rt.chosen[i];
        logEvent('quiz_submit', {
          topic_id: rt.topicId,
          scene_id: `${rt.topicId}_quiz`,
          question_id: `q${i+1}`,
          selected_option: q.options[chosenIndex] ?? '',
          correct_answer: q.options[q.answer] ?? q.answer,
          is_correct: chosenIndex === q.answer ? 'true' : 'false',
          duration_in_scene: Number((((nowTs() - (rt.startedAt || nowTs())) / 1000)).toFixed(1))
        });
      });
      setText('#quizQuestion', `作答完成\n共答對 ${saved.score}/${saved.total} 題`);
      setText('#quizResult', topic.quiz.questions.map((q, i) => `第 ${i+1} 題正確答案：${q.options[q.answer]}`).join('\n'));
      setVisible('#quizResult', true);
      for (let i=1;i<=3;i++){
        const btn = qs(`#quizOptBtn${i}`);
        const label = qs(`#quizOptText${i}`);
        if (btn) btn.setAttribute('visible', false);
        if (label) label.setAttribute('visible', false);
      }
      const nextBtn = qs('#quizNextBtn');
      if (nextBtn) nextBtn.setAttribute('src', '#btnimg-back');
      rt.submitted = true;
      state.quizRuntime = rt;
      saveState();
    }

    function downloadLog(){
      try{
        const name = localStorage.getItem(STORAGE_KEY_NAME) || 'user';
        logEvent('download_log', {
          topic_id: state?.current?.topicId || '',
          scene_id: state?.current?.lessonId || (state?.current?.topicId ? `${state.current.topicId}_hub` : 'topic_menu')
        });
        const payload = JSON.stringify(state.logs, null, 2);
        const blob = new Blob([payload], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `svvr_log_${name}.json`;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { try{ a.remove(); }catch(e){} }, 0);
        URL.revokeObjectURL(url);
      }catch(e){}
    }

    AFRAME.registerComponent('ui-action', {
      schema: { action: {type:'string'}, a: {type:'string'}, b:{type:'string'} },
      init: function(){
        this.onClick = () => {
          const act = this.data.action;
          const closers = ['closeInfo','toggleProgress'];
          if (isAnyOverlayOpen()) {
            const overlay = activeOverlayType();
            if (!(overlay === 'progress' && act === 'toggleProgress') && !(overlay === 'info' && act === 'closeInfo')) {
              return;
            }
          }

          if (act === 'goTopicMenu') return goTopicMenu();
          if (act === 'goHub')       return goHub(this.data.a);
          if (act === 'goLesson')    return goLesson(this.data.a, this.data.b);
          if (act === 'startQuiz') {
            if (qs('#btnStartQuiz')?.getAttribute('data-enabled') !== 'true') return;
            return startQuiz(this.data.a);
          }
          if (act === 'chooseOpt')   return chooseOption(parseInt(this.data.a,10));
          if (act === 'prevQuiz')    return prevQuiz();
          if (act === 'nextQuiz')    return nextOrSubmitQuiz();
          if (act === 'closeInfo')   return closeInfoPanel();
          if (act === 'downloadLog') return downloadLog();
          if (act === 'toggleProgress') return toggleHubProgress();
        };
        this.el.addEventListener('click', this.onClick);
      },
      remove: function(){
        this.el.removeEventListener('click', this.onClick);
      }
    });

    
    // =========================
    window.addEventListener('DOMContentLoaded', () => {
      loadState();

      const gate  = document.getElementById('nameGate');
      const input = document.getElementById('studentNameInput');
      const btn   = document.getElementById('startBtn');

      const savedName = localStorage.getItem(STORAGE_KEY_NAME) || '';
      gate.style.display = 'flex';
      if (input) input.value = savedName;
      setTimeout(() => input && input.focus(), 50);

      function start(){
        const name = (input?.value || '').trim();
        if (!name) { input && input.focus(); return; }
        localStorage.setItem(STORAGE_KEY_NAME, name);
        gate.style.display = 'none';
        goTopicMenu();
      }
      btn?.addEventListener('click', start);
      input?.addEventListener('keydown', (e) => { if (e.key === 'Enter') start(); });


    });
  </script>
</head>
